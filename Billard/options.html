<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billard DOM - Options</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/options.css" />
</head>
<body>

  <a href="menu.html" class="back-home-btn">← Retour</a>

  <main class="options-page">
    <section class="options-card">
      <h1>Paramètres</h1>

      <div class="option-group">
        <label for="soundEnabled">Sons du jeu</label>
        <input type="checkbox" id="soundEnabled" checked />
      </div>

      <div class="option-group">
        <label for="musicEnabled">Musique jazz</label>
        <input type="checkbox" id="musicEnabled" checked />
      </div>

      <div class="option-group">
        <label for="soundVolume">Volume général</label>
        <input type="range" id="soundVolume" min="0" max="100" value="50" />
        <span id="volumeValue">50%</span>
      </div>
    </section>
  </main>

  <script src="js/audioManager.js"></script>
  <script src="js/options.js"></script>
</body>
</html>
